# Minimal golangci-lint v1 config. Strict-but-not-hostile.
run:
  timeout: 3m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gofmt
    - goimports
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - typecheck
    - unconvert
    - unused

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/ZlatanOmerovic/onboardctl

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false
