# Minimal golangci-lint v1 config. Strict-but-not-hostile.
run:
  timeout: 3m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gofmt
    - goimports
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - typecheck
    - unconvert
    - unused

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/ZlatanOmerovic/onboardctl
  errcheck:
    # Errors from stdout/stderr writes and best-effort Close calls
    # aren't actionable and add noise. Everything else still needs
    # a check.
    exclude-functions:
      - fmt.Fprintln
      - fmt.Fprintf
      - fmt.Fprint
      - (*text/tabwriter.Writer).Flush
      - (*os.File).Close

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false
