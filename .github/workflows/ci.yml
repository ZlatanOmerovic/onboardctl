name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build + test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.24.x"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          diff=$(gofmt -s -l .)
          if [[ -n "$diff" ]]; then
            echo "::error::gofmt -s -l reported:"
            echo "$diff"
            exit 1
          fi

      - name: go test
        run: go test -race -count=1 ./...

      - name: go build
        run: go build -trimpath -o onboardctl ./cmd/onboardctl

      - name: smoke test
        run: |
          ./onboardctl version
          ./onboardctl status
          ./onboardctl --help

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=3m
